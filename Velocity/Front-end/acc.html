<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Front-end/src/styles/acc/style.css">
    <title>Conta - Velocity</title>
</head>
<body>
    <div class="box">
        <div class="btns">
            <h2 class="velc">Velocity</h2>
            <button class="btn-selec">Informações</button>
            <button class="btn-n-selec">Ver pedidos</button>
            <button class="btn-n-selec">Mudar dados</button>
            <button class="btn-n-selec">Mudar senha</button>
            <button class="btn-n-selec" id="excluir">Ecluir Conta</button>
        </div>
        <h1 class="tit">Revise suas informações</h1>
        <div class="txt">
            <div class="geral">
                <div class="infos">
                    <div class="profile-div">
                        <span class="profile-title" style="margin-top: 5px;">Nome</span>
                    </div>
                    <div class="profile-div">
                        <span class="profile-title" style="margin-top: 5px;">E-mail</span>
                    </div>
                    <div class="profile-div">
                        <span class="profile-title" style="margin-top: 5px;">Senha</span>
                    </div>
                    <div class="profile-div">
                        <span class="profile-title" style="margin-top: 5px;">Telefone</span>
                    </div>
                    <div class="profile-div">
                        <span class="profile-title" style="margin-top: 5px;">CEP</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
