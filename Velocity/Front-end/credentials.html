<html lang="en">
<head>

    <title>Complementos</title>
</head>
<body>
    <div class="box">
        <h1 class="tit">Complemente suas informações</h1>
        <div class="corpo">
            <h3 class="subtit">Nome</h3>
            <input type="text" id="name">
            <h3 class="subtit">Telefone</h3>
            <input type="text">
            <h3 class="subtit">Idade</h3>
            <input type="number" min="0" max="120">
            <h3 class="subtit">Aperte no botão para compartilhar sua localização</h3>
            <button>localização</button>
        </div>
        <button class="btn-fim" onclick="finalizarCriação()">Finalizar</button>
    </div>
</body>
<script src="/Front-end/src/js/criar/credentials.js"></script>
