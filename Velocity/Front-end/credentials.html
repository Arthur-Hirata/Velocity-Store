<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Front-end/src/styles/criar/credentials.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title>Complementos</title>
</head>
<body>
    <div class="box">
        <h1 class="tit">Complemente suas informações</h1>
        <div class="corpo">
            <h3 class="subtit">Nome</h3>
            <input type="text" id="name" placeholder="Digete seu nome">
            <h3 class="subtit">Telefone</h3>
            <input type="number" placeholder="Ex: 44 96731-3129" id="number">
            <h3 class="subtit" id="endereço">Endereço</h3>
            <input type="text" placeholder="Digite seu endereço">
        </div>
        <button class="btn-fim" onclick="finalizarCriação()">Finalizar</button>
    </div>
</body>
<script src="/Front-end/src/js/criar/credentials.js"></script>
</html>
