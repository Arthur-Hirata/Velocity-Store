<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Front-end/src/styles/criar/style-criar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title>Criar Conta</title>
</head>
<body>
    <div class="box">
        <h1 class="tit">Crie sua conta!</h1>
        <div class="corpo">
            <h3 class="subtit">Insira um e-mail</h3>
            <input type="text" placeholder="Insira seu e-mail" id="email">
            <h5 id="erro3" style="display:none">E-mail inválido</h5>
            <div class="password">
                <h3 class="subtit">Crie uma senha </h3>
                <form>
                    <input type="password" placeholder="Insira uma senha forte" id="senha1">
                </form>
                <h5 id="erro1" style="display:none">Sua Senha deve ao menos 8 caracteres</h5>
                <button class="btn-olho"><i class="fas fa-eye" id="eye1"></i></button>
            </div>
            <div class="password" style="margin-top: -20px;">
                <h3 class="subtit">Repita sua senha</h3>
                <form>
                    <input type="password" placeholder="Insira sua senha novemente" id="senha2">
                </form>
                <h5 id="erro2" style="display:none">Senha incorreta</h5>
                <button class="btn-olho"><i class="fas fa-eye" id="eye2"></i></button>
            </div>
        </div>
        <button class="criarConta" onclick="criarConta()">Cria Conta</button>
    </div>
    <div id="loader" style="visibility: hidden;">
        <div class="spinner">
        </div>
        <h1>Estamos criando Sua conta!</h1>
    </div>
</body>
<script src="/Front-end/src/js/criar/scipt-criar.js"></script>
</html>
